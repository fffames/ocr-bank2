version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ocr_bank_db
    environment:
      POSTGRES_USER: ocr_bank_user
      POSTGRES_PASSWORD: ocr_bank_password
      POSTGRES_DB: ocr_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocr_bank_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
